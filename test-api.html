<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eGov AI API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .config {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .config-item {
            margin-bottom: 15px;
        }
        
        .config-item label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }
        
        .config-item input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }
        
        .test-section {
            margin-bottom: 30px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
        }
        
        .test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .test-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .prompt-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            font-family: inherit;
        }
        
        .result {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .result.success {
            border-left-color: #4caf50;
            background: #f1f8f4;
        }
        
        .result.error {
            border-left-color: #f44336;
            background: #ffebee;
        }
        
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status-success {
            background: #4caf50;
            color: white;
        }
        
        .status-error {
            background: #f44336;
            color: white;
        }
        
        .status-pending {
            background: #ff9800;
            color: white;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .credits-display {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 eGov AI API Tester</h1>
        <p class="subtitle">Test your eGov AI integration in real-time</p>
        
        <div class="config">
            <h3>Configuration</h3>
            <div class="config-item">
                <label>API Base URL:</label>
                <input type="text" id="apiBase" value="https://egov-ai-core-ws.oueg.info" />
            </div>
            <div class="config-item">
                <label>Access Code:</label>
                <input type="text" id="accessCode" value="f2c81ce889a5850fd59487ce988ec1324183682c62d300bdbd33d5064862942b" />
            </div>
            <div class="config-item">
                <label>Token: <span id="tokenStatus" class="status-badge status-pending">Not Generated</span></label>
                <input type="text" id="token" placeholder="Will be auto-generated..." readonly />
            </div>
        </div>

        <div class="info-box">
            <div class="credits-display">
                Credits Remaining: <span id="creditsDisplay">--</span>
            </div>
        </div>

        <!-- Test 1: Generate Token -->
        <div class="test-section">
            <div class="test-header">
                <div class="test-title">1️⃣ Generate Access Token</div>
                <button onclick="testGenerateToken()">Test</button>
            </div>
            <div id="result1"></div>
        </div>

        <!-- Test 2: Get Credits -->
        <div class="test-section">
            <div class="test-header">
                <div class="test-title">2️⃣ Get Token Credits</div>
                <button onclick="testGetCredits()">Test</button>
            </div>
            <div id="result2"></div>
        </div>

        <!-- Test 3: AI Assistant -->
        <div class="test-section">
            <div class="test-header">
                <div class="test-title">3️⃣ AI Assistant</div>
                <button onclick="testAIAssistant()">Test</button>
            </div>
            <input type="text" class="prompt-input" id="aiPrompt" placeholder="Enter your question..." value="How can I get my digital TIN ID in the Philippines?" />
            <div id="result3"></div>
        </div>

        <!-- Test 4: Custom Query -->
        <div class="test-section">
            <div class="test-header">
                <div class="test-title">4️⃣ Custom Query</div>
                <button onclick="testCustomQuery()">Test</button>
            </div>
            <input type="text" class="prompt-input" id="customPrompt" placeholder="Ask anything about Philippine government services..." value="What documents do I need to renew my driver license?" />
            <div id="result4"></div>
        </div>
    </div>

    <script>
        let token = null;

        function showResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            const resultClass = isError ? 'result error' : 'result success';
            const content = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
            element.innerHTML = `<div class="${resultClass}"><pre>${content}</pre></div>`;
        }

        function showLoading(elementId) {
            const element = document.getElementById(elementId);
            element.innerHTML = '<div class="result"><div class="loading"></div> Loading...</div>';
        }

        async function testGenerateToken() {
            showLoading('result1');
            const apiBase = document.getElementById('apiBase').value;
            const accessCode = document.getElementById('accessCode').value;

            try {
                const response = await fetch(`${apiBase}/api/v1/egov/integration/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        access_code: accessCode
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.access_token;
                    document.getElementById('token').value = token;
                    document.getElementById('tokenStatus').textContent = 'Active';
                    document.getElementById('tokenStatus').className = 'status-badge status-success';
                    document.getElementById('creditsDisplay').textContent = `${data.credits_remaining} / ${data.credits_total}`;
                    showResult('result1', data);
                } else {
                    showResult('result1', data, true);
                }
            } catch (error) {
                showResult('result1', `Error: ${error.message}`, true);
            }
        }

        async function testGetCredits() {
            if (!token) {
                showResult('result2', 'Please generate a token first!', true);
                return;
            }

            showLoading('result2');
            const apiBase = document.getElementById('apiBase').value;

            try {
                const response = await fetch(`${apiBase}/api/v1/egov/integration/credits`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.credits_remaining !== undefined) {
                        document.getElementById('creditsDisplay').textContent = `${data.credits_remaining}`;
                    }
                    showResult('result2', data);
                } else {
                    showResult('result2', data, true);
                }
            } catch (error) {
                showResult('result2', `Error: ${error.message}`, true);
            }
        }

        async function testAIAssistant() {
            if (!token) {
                showResult('result3', 'Please generate a token first!', true);
                return;
            }

            showLoading('result3');
            const apiBase = document.getElementById('apiBase').value;
            const prompt = document.getElementById('aiPrompt').value;

            try {
                const response = await fetch(`${apiBase}/api/v1/egov/integration/ai_assistant/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        category: 'PH'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('result3', data);
                    // Update credits after successful call
                    testGetCredits();
                } else {
                    showResult('result3', data, true);
                }
            } catch (error) {
                showResult('result3', `Error: ${error.message}`, true);
            }
        }

        async function testCustomQuery() {
            if (!token) {
                showResult('result4', 'Please generate a token first!', true);
                return;
            }

            showLoading('result4');
            const apiBase = document.getElementById('apiBase').value;
            const prompt = document.getElementById('customPrompt').value;

            try {
                const response = await fetch(`${apiBase}/api/v1/egov/integration/ai_assistant/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        category: 'PH'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('result4', data);
                    // Update credits after successful call
                    testGetCredits();
                } else {
                    showResult('result4', data, true);
                }
            } catch (error) {
                showResult('result4', `Error: ${error.message}`, true);
            }
        }

        // Auto-generate token on page load
        window.addEventListener('load', () => {
            console.log('eGov AI API Tester loaded');
            console.log('Click "Test" buttons to test each endpoint');
        });
    </script>
</body>
</html>
